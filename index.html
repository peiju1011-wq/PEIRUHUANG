本作品中，結構逐漸消融於更為細膩且帶有空氣感的畫面之中。 
網格的痕跡變得柔和而隱約，而是與層層肌理交織融合，使色彩與筆觸以更內在、低聲的節奏浮現。

畫面不再是流動，而是透過反覆推擠、覆蓋與壓平所形成的厚重肌理。

  const images = [work.img, ...work.gallery];

  const next = () => {
    setActiveIndex((prev) => (prev + 1) % images.length);
  };

  const prev = () => {
    setActiveIndex((prev) => (prev - 1 + images.length) % images.length);
  };

  // ✅ 鍵盤控制
  useEffect(() => {
    const handleKey = (e) => {
      if (e.key === "Escape") setActiveIndex(null);
      if (e.key === "ArrowRight") next();
      if (e.key === "ArrowLeft") prev();

  }, []);

{/* 描述 */}

<a

  </div>

</div>


      </div>

      {/* 🔥 Modal */}
      {activeIndex !== null && (
        <div

<button
  onClick={(e) => {
    e.stopPropagation();
    prev();
  }}
  className="
    absolute

    /* 📱 手機：底部左 */
    left-1/2 -translate-x-16 bottom-6

  "
>

    <path d="M15 18L9 12L15 6" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
  </svg>
</button>

          {/* 圖 */}
          <img
            src={images[activeIndex]}

          {/* 右 */}
<button

          {/* 張數 */}
          <div className="absolute bottom-6 text-white text-xs tracking-widest">

 const ContactPage = () => {
            const [status, setStatus] = React.useState(""); // 確保使用 React.useState

            const handleSubmit = async (e) => {
                e.preventDefault();
                const form = e.target;
                const data = new FormData(form);
                setStatus("Sending...");
                
                // 這裡使用了您提供的 Formspree ID
                const response = await fetch("https://formspree.io/f/xdaanzjk", {
                    method: "POST",
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    setStatus("SUCCESS");
                    form.reset();
                } else {
                    setStatus("ERROR");
                }
            };

            return (
                <div className="pt-32 pb-20 min-h-screen bg-background-light dark:bg-background-dark">

                                    <p className="text-sm dark:text-white tracking-widest uppercase">New Taipei City, Taiwan</p>
                                </div>

                                

                            </div>
                        </div>
                    </main>
                </div>
            );
        };
